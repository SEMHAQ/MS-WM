site_name: SSM-World-Model
site_description: 面向人形机器人状态预测的轻量级状态空间世界模型
site_url: ""
repo_url: https://github.com/SEMHAQ/SSM-World-Model
repo_name: SEMHAQ/SSM-World-Model

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换暗色
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换亮色
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css

nav:
  - 首页: index.md
  - 方法:
    - 问题描述与预备知识: method/background.md
    - SSM-WM架构: method/architecture.md
    - MPC集成: method/mpc.md
  - 实验:
    - 实验设置: experiments/setup.md
    - 主要结果: experiments/results.md
    - 消融实验: experiments/ablation.md
  - 讨论与结论:
    - 讨论: discussion/discussion.md
    - 局限性与未来工作: discussion/limitations.md
