# SSM-World-Model 实验配置

# 数据
data:
  data_dir: "data/robot"
  seq_len: 16
  batch_size: 64
  num_workers: 4
  normalize: true
  state_dim: 28    # 人形机器人关节状态维度
  action_dim: 7    # 动作维度

# SSM世界模型
ssm_wm:
  d_model: 128
  d_state: 16
  n_layers: 4
  d_conv: 4
  expand: 2

# LSTM基线
lstm_wm:
  hidden_dim: 128
  n_layers: 2

# Transformer基线
transformer_wm:
  d_model: 128
  nhead: 4
  n_layers: 3

# 训练
train:
  epochs: 100
  lr: 1.0e-3
  weight_decay: 1.0e-4
  lr_scheduler: cosine    # cosine / step
  warmup_epochs: 5
  multi_step_loss_weight: 0.5   # lambda
  multi_step_horizon: 8         # H
  grad_clip: 1.0
  seed: 42

# MPC控制
mpc:
  horizon: 10
  Q_weight: 1.0       # 状态跟踪权重
  R_weight: 0.01      # 动作正则化权重
  n_iterations: 50    # 优化迭代次数
  lr: 0.01

# 日志
log:
  save_dir: "experiments/"
  log_interval: 10
  eval_interval: 5
  save_best: true
